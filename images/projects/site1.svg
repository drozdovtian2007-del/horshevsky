<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <!-- Browser chrome -->
  <rect width="800" height="500" fill="#1e1e2e" rx="0"/>
  <rect width="800" height="36" fill="#2a2a3e"/>
  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <!-- Address bar -->
  <rect x="90" y="8" width="540" height="20" rx="10" fill="#1a1a2e"/>
  <text x="360" y="22" text-anchor="middle" fill="#8b8baa" font-size="11">lumina.studio</text>
  <!-- Page content: dark landing -->
  <rect x="0" y="36" width="800" height="464" fill="#0f0f1a"/>
  <!-- Gradient bg -->
  <defs>
    <linearGradient id="hero1" x1="0" y1="0" x2="800" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0035"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="rgba(232,121,249,0.25)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect x="0" y="36" width="800" height="464" fill="url(#hero1)"/>
  <rect x="0" y="36" width="800" height="464" fill="url(#glow1)"/>
  <!-- Nav -->
  <text x="50" y="76" fill="white" font-size="16" font-weight="700">Lumina</text>
  <text x="320" y="76" fill="#ccc" font-size="13">Услуги</text>
  <text x="400" y="76" fill="#ccc" font-size="13">Работы</text>
  <text x="480" y="76" fill="#ccc" font-size="13">О нас</text>
  <rect x="600" y="60" width="130" height="32" rx="16" fill="#e879f9"/>
  <text x="665" y="81" text-anchor="middle" fill="white" font-size="13" font-weight="600">Получить оффер</text>
  <!-- Hero text -->
  <text x="50" y="160" fill="#e879f9" font-size="13" font-weight="600" letter-spacing="3">СТУДИЯ РАЗРАБОТКИ</text>
  <text x="50" y="210" fill="white" font-size="38" font-weight="800">Создадим сайт,</text>
  <text x="50" y="256" fill="white" font-size="38" font-weight="800">который <tspan fill="#e879f9">продаёт</tspan></text>
  <text x="50" y="298" fill="#9ca3af" font-size="15">Разработка под ключ — быстро и по делу</text>
  <!-- CTA buttons -->
  <rect x="50" y="320" width="160" height="44" rx="22" fill="#e879f9"/>
  <text x="130" y="348" text-anchor="middle" fill="white" font-size="14" font-weight="600">Получить оффер →</text>
  <rect x="226" y="320" width="130" height="44" rx="22" fill="transparent" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <text x="291" y="348" text-anchor="middle" fill="white" font-size="14">Портфолио</text>
  <!-- Stats bar -->
  <rect x="0" y="420" width="800" height="80" fill="rgba(0,0,0,0.4)"/>
  <rect x="0" y="420" width="800" height="1" fill="rgba(255,255,255,0.1)"/>
  <text x="120" y="452" text-anchor="middle" fill="white" font-size="26" font-weight="700">120+</text>
  <text x="120" y="470" text-anchor="middle" fill="#9ca3af" font-size="11">проектов</text>
  <rect x="260" y="430" width="1" height="40" fill="rgba(255,255,255,0.1)"/>
  <text x="380" y="452" text-anchor="middle" fill="white" font-size="26" font-weight="700">4.9★</text>
  <text x="380" y="470" text-anchor="middle" fill="#9ca3af" font-size="11">рейтинг</text>
  <rect x="520" y="430" width="1" height="40" fill="rgba(255,255,255,0.1)"/>
  <text x="640" y="452" text-anchor="middle" fill="white" font-size="26" font-weight="700">3 дня</text>
  <text x="640" y="470" text-anchor="middle" fill="#9ca3af" font-size="11">средний срок</text>
</svg>
