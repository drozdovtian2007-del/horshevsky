<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <rect width="400" height="260" fill="#fafafa"/>
  <!-- Browser chrome -->
  <rect width="400" height="28" fill="#f0f0f0"/>
  <circle cx="16" cy="14" r="5" fill="#ff5f57"/>
  <circle cx="30" cy="14" r="5" fill="#febc2e"/>
  <circle cx="44" cy="14" r="5" fill="#28c840"/>
  <rect x="70" y="8" width="260" height="14" rx="7" fill="#e0e0e0"/>
  <text x="200" y="19" text-anchor="middle" fill="#999" font-size="8">lumina-studio.ru</text>
  <!-- Hero section dark -->
  <rect x="0" y="28" width="400" height="130" fill="#0f0c1e"/>
  <!-- Nav -->
  <text x="20" y="48" fill="#fff" font-size="11" font-weight="700">LUMINA</text>
  <text x="260" y="48" fill="#d1d5db" font-size="8">Услуги</text>
  <text x="300" y="48" fill="#d1d5db" font-size="8">Портфолио</text>
  <text x="342" y="48" fill="#d1d5db" font-size="8">Контакт</text>
  <!-- Hero text -->
  <text x="20" y="80" fill="#e879f9" font-size="9" font-weight="600" letter-spacing="3">ДИЗАЙН-СТУДИЯ</text>
  <text x="20" y="100" fill="#fff" font-size="18" font-weight="700">Создаём бренды,</text>
  <text x="20" y="118" fill="#fff" font-size="18" font-weight="700">которые <tspan fill="#e879f9">запоминают</tspan></text>
  <!-- CTA -->
  <rect x="20" y="127" width="86" height="22" rx="11" fill="#e879f9"/>
  <text x="63" y="141" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">Обсудить проект</text>
  <!-- Stats bar -->
  <rect x="0" y="158" width="400" height="40" fill="#fff" filter="url(#sh)"/>
  <text x="60" y="175" text-anchor="middle" fill="#111" font-size="14" font-weight="700">120+</text>
  <text x="60" y="188" text-anchor="middle" fill="#9ca3af" font-size="8">проектов</text>
  <line x1="120" y1="162" x2="120" y2="194" stroke="#e5e7eb" stroke-width="1"/>
  <text x="200" y="175" text-anchor="middle" fill="#111" font-size="14" font-weight="700">98%</text>
  <text x="200" y="188" text-anchor="middle" fill="#9ca3af" font-size="8">довольных клиентов</text>
  <line x1="280" y1="162" x2="280" y2="194" stroke="#e5e7eb" stroke-width="1"/>
  <text x="340" y="175" text-anchor="middle" fill="#111" font-size="14" font-weight="700">5 лет</text>
  <text x="340" y="188" text-anchor="middle" fill="#9ca3af" font-size="8">на рынке</text>
  <!-- Services row -->
  <text x="20" y="215" fill="#111" font-size="9" font-weight="600">Наши услуги</text>
  <rect x="20" y="222" width="78" height="28" rx="8" fill="#fdf4ff" stroke="#f0abfc" stroke-width="1"/>
  <text x="59" y="239" text-anchor="middle" fill="#a21caf" font-size="8">🎨 Брендинг</text>
  <rect x="106" y="222" width="78" height="28" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="145" y="239" text-anchor="middle" fill="#1d4ed8" font-size="8">💻 Веб-дизайн</text>
  <rect x="192" y="222" width="78" height="28" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="231" y="239" text-anchor="middle" fill="#15803d" font-size="8">📱 Упаковка</text>
  <rect x="278" y="222" width="100" height="28" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="328" y="239" text-anchor="middle" fill="#c2410c" font-size="8">📸 Фотосъёмка</text>
</svg>
