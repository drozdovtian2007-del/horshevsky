  <!-- Score display -->
  <text x="200" y="84" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="700">24 680</text>
  <text x="200" y="96" text-anchor="middle" fill="#6b7280" font-size="8">очков</text>
  <!-- Stars -->
  <text x="200" y="112" text-anchor="middle" fill="#f59e0b" font-size="10">★★★★☆  ×84</text>
  <!-- Leaderboard -->
  <text x="118" y="152" fill="#94a3b8" font-size="9" font-weight="600">🏆 Топ игроков</text>
  <rect x="118" y="158" width="164" height="22" rx="6" fill="#f59e0b" opacity=".15"/>
  <text x="130" y="173" fill="#f59e0b" font-size="10" font-weight="700">1</text>
  <text x="146" y="173" fill="#fff" font-size="9">CryptoKing</text>
  <text x="274" y="173" text-anchor="end" fill="#f59e0b" font-size="9" font-weight="700">148 920</text>
  <rect x="118" y="184" width="164" height="20" rx="6" fill="#0e0a30"/>
  <text x="130" y="198" fill="#6b7280" font-size="10">2</text>
  <text x="146" y="198" fill="#e2e8f0" font-size="9">NightOwl99</text>
  <text x="274" y="198" text-anchor="end" fill="#6b7280" font-size="9">87 440</text>
  <rect x="118" y="208" width="164" height="20" rx="6" fill="#0e0a30"/>
  <text x="130" y="222" fill="#6b7280" font-size="10">3</text>
  <text x="146" y="222" fill="#e2e8f0" font-size="9">SpeedRunner</text>
  <text x="274" y="222" text-anchor="end" fill="#6b7280" font-size="9">62 180</text>
  <!-- Buy stars button -->
  <rect x="118" y="234" width="164" height="16" rx="8" fill="#4f46e5" opacity=".5"/>
  <text x="200" y="246" text-anchor="middle" fill="#c7d2fe" font-size="8">✦ Купить Stars</text>
