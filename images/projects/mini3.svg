<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#030b1a"/>
      <stop offset="100%" stop-color="#0a1528"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="#030b1a"/>
  <!-- Top bar -->
  <rect width="800" height="52" fill="#060e1e"/>
  <rect width="800" height="1" y="52" fill="rgba(0,255,180,0.15)"/>
  <text x="400" y="30" text-anchor="middle" fill="white" font-size="15" font-weight="600">CryptoRun</text>
  <text x="20" y="30" fill="#00ffb4" font-size="13">←</text>
  <!-- Score -->
  <text x="680" y="22" fill="#fbbf24" font-size="10" font-weight="600">ОЧКИ</text>
  <text x="680" y="40" fill="#fbbf24" font-size="17" font-weight="700">24 680</text>

  <!-- Game canvas area -->
  <rect x="0" y="53" width="500" height="300" fill="#040d1c"/>
  <!-- Grid lines -->
  <line x1="0" y1="53" x2="500" y2="53" stroke="rgba(0,255,180,0.08)" stroke-width="1"/>
  <line x1="0" y1="103" x2="500" y2="103" stroke="rgba(0,255,180,0.05)" stroke-width="1"/>
  <line x1="0" y1="153" x2="500" y2="153" stroke="rgba(0,255,180,0.05)" stroke-width="1"/>
  <line x1="0" y1="203" x2="500" y2="203" stroke="rgba(0,255,180,0.05)" stroke-width="1"/>
  <line x1="0" y1="253" x2="500" y2="253" stroke="rgba(0,255,180,0.05)" stroke-width="1"/>
  <!-- Neon floor -->
  <rect x="0" y="316" width="500" height="2" fill="#00ffb4" opacity="0.6"/>
  <rect x="0" y="318" width="500" height="35" fill="rgba(0,255,180,0.04)"/>
  <!-- Runner character -->
  <rect x="80" y="276" width="28" height="40" rx="4" fill="#00ffb4"/>
  <circle cx="94" cy="272" r="14" fill="#00ffb4"/>
  <rect x="82" y="280" width="10" height="18" rx="2" fill="#030b1a"/>
  <rect x="100" y="280" width="10" height="18" rx="2" fill="#030b1a"/>
  <!-- Legs running -->
  <rect x="84" y="296" width="8" height="20" rx="3" fill="#00ffb4"/>
  <rect x="98" y="296" width="8" height="20" rx="3" fill="#00ffb4" transform="translate(0,-8)"/>
  <!-- Obstacles -->
  <rect x="280" y="278" width="30" height="40" rx="3" fill="#f43f5e"/>
  <rect x="280" y="278" width="30" height="4" fill="#ff6b6b"/>
  <rect x="380" y="258" width="30" height="60" rx="3" fill="#f43f5e"/>
  <rect x="380" y="258" width="30" height="4" fill="#ff6b6b"/>
  <rect x="450" y="268" width="30" height="50" rx="3" fill="#f43f5e"/>
  <!-- Coins -->
  <circle cx="200" cy="260" r="10" fill="#fbbf24" opacity="0.9"/>
  <text x="200" y="264" text-anchor="middle" fill="#030b1a" font-size="9" font-weight="700">$</text>
  <circle cx="240" cy="240" r="10" fill="#fbbf24" opacity="0.9"/>
  <text x="240" y="244" text-anchor="middle" fill="#030b1a" font-size="9" font-weight="700">$</text>
  <circle cx="320" cy="230" r="10" fill="#fbbf24" opacity="0.6"/>
  <text x="320" y="234" text-anchor="middle" fill="#030b1a" font-size="9" font-weight="700">$</text>
  <!-- Speed boost trail -->
  <rect x="0" y="278" width="72" height="3" rx="2" fill="#00ffb4" opacity="0.4"/>
  <rect x="0" y="284" width="50" height="2" rx="1" fill="#00ffb4" opacity="0.2"/>

  <!-- Game UI overlay -->
  <text x="20" y="82" fill="#00ffb4" font-size="11" font-weight="600">LVL 8</text>
  <rect x="60" y="72" width="120" height="10" rx="5" fill="rgba(0,255,180,0.1)"/>
  <rect x="60" y="72" width="92" height="10" rx="5" fill="#00ffb4" opacity="0.7"/>
  <text x="20" y="105" fill="#fbbf24" font-size="11" font-weight="600">★ 12x</text>

  <!-- Right panel: leaderboard + shop -->
  <rect x="510" y="52" width="290" height="448" fill="#060e1e"/>
  <rect x="510" y="52" width="1" height="448" fill="rgba(0,255,180,0.1)"/>

  <!-- Leaderboard -->
  <text x="655" y="88" text-anchor="middle" fill="white" font-size="14" font-weight="600">Рейтинг</text>
  <!-- Rank 1 -->
  <rect x="524" y="96" width="262" height="50" rx="10" fill="#0d2412" stroke="rgba(251,191,36,0.3)" stroke-width="1"/>
  <text x="542" y="127" fill="#fbbf24" font-size="18" font-weight="700">🥇</text>
  <text x="572" y="116" fill="white" font-size="13" font-weight="600">@cryptoking</text>
  <text x="572" y="133" fill="#9ca3af" font-size="11">48 920 очков</text>
  <text x="762" y="127" text-anchor="end" fill="#fbbf24" font-size="12" font-weight="700">#1</text>
  <!-- Rank 2 -->
  <rect x="524" y="154" width="262" height="50" rx="10" fill="#0a1520"/>
  <text x="542" y="185" fill="#9ca3af" font-size="18">🥈</text>
  <text x="572" y="174" fill="white" font-size="13" font-weight="600">@speedster</text>
  <text x="572" y="191" fill="#9ca3af" font-size="11">36 540 очков</text>
  <text x="762" y="185" text-anchor="end" fill="#9ca3af" font-size="12" font-weight="700">#2</text>
  <!-- Rank 3 -->
  <rect x="524" y="212" width="262" height="50" rx="10" fill="#0a1520"/>
  <text x="542" y="243" fill="#cd7f32" font-size="18">🥉</text>
  <text x="572" y="232" fill="white" font-size="13" font-weight="600">@runner99</text>
  <text x="572" y="249" fill="#9ca3af" font-size="11">29 180 очков</text>
  <text x="762" y="243" text-anchor="end" fill="#cd7f32" font-size="12" font-weight="700">#3</text>
  <!-- Current user -->
  <rect x="524" y="270" width="262" height="50" rx="10" fill="#0d1e35" stroke="rgba(0,255,180,0.3)" stroke-width="1"/>
  <text x="542" y="301" fill="#00ffb4" font-size="16">🏃</text>
  <text x="572" y="290" fill="#00ffb4" font-size="13" font-weight="600">Вы</text>
  <text x="572" y="307" fill="#9ca3af" font-size="11">24 680 очков</text>
  <text x="762" y="301" text-anchor="end" fill="#00ffb4" font-size="12" font-weight="700">#7</text>

  <!-- Stars shop -->
  <rect x="524" y="336" width="262" height="120" rx="12" fill="#0a0e1e" stroke="rgba(251,191,36,0.2)" stroke-width="1"/>
  <text x="655" y="360" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600">⭐ Telegram Stars</text>
  <rect x="536" y="370" width="112" height="40" rx="10" fill="#12203a"/>
  <text x="592" y="386" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="600">50 ⭐</text>
  <text x="592" y="402" text-anchor="middle" fill="white" font-size="11">x2 скорость</text>
  <rect x="660" y="370" width="112" height="40" rx="10" fill="#12203a"/>
  <text x="716" y="386" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">100 ⭐</text>
  <text x="716" y="402" text-anchor="middle" fill="white" font-size="11">щит от смерти</text>
  <rect x="536" y="416" width="236" height="30" rx="10" fill="#fbbf24"/>
  <text x="654" y="436" text-anchor="middle" fill="#030b1a" font-size="12" font-weight="700">Купить Stars</text>

  <!-- Bottom game controls -->
  <rect x="0" y="354" width="500" height="146" fill="#050c1a"/>
  <rect x="0" y="354" width="500" height="1" fill="rgba(0,255,180,0.1)"/>
  <!-- D-pad left/right and jump -->
  <rect x="30" y="380" width="60" height="60" rx="30" fill="#0d2030" stroke="rgba(0,255,180,0.2)" stroke-width="1"/>
  <text x="60" y="416" text-anchor="middle" fill="#00ffb4" font-size="20">←</text>
  <rect x="120" y="380" width="60" height="60" rx="30" fill="#0d2030" stroke="rgba(0,255,180,0.2)" stroke-width="1"/>
  <text x="150" y="416" text-anchor="middle" fill="#00ffb4" font-size="20">→</text>
  <rect x="360" y="366" width="100" height="80" rx="40" fill="#002a1c" stroke="rgba(0,255,180,0.4)" stroke-width="2"/>
  <text x="410" y="413" text-anchor="middle" fill="#00ffb4" font-size="24" font-weight="700">↑</text>
  <text x="250" y="420" text-anchor="middle" fill="#4b5563" font-size="11">ПРЫЖОК</text>
</svg>
