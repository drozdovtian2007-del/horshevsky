<svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f0a2e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="260" fill="url(#sky)"/>
  <rect x="110" y="4" width="180" height="252" rx="20" fill="#070718" stroke="#1a1060" stroke-width="1.5"/>
  <!-- Status -->
  <text x="125" y="22" fill="#475569" font-size="8">9:41</text>
  <!-- Game header -->
  <rect x="110" y="28" width="180" height="36" fill="#0e0a30"/>
  <text x="200" y="50" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="700">⚡ CryptoRun</text>
  <!-- Game canvas -->
  <rect x="118" y="68" width="164" height="70" rx="8" fill="#04020f" stroke="#1a1060" stroke-width="1"/>
