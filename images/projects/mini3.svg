  <line x1="118" y1="124" x2="282" y2="124" stroke="#4f46e5" stroke-width="2" opacity=".6"/>
  <!-- Obstacles -->
  <rect x="240" y="110" width="12" height="14" rx="2" fill="#ef4444"/>
  <rect x="260" y="106" width="8" height="18" rx="2" fill="#ef4444" opacity=".7"/>
  <!-- Runner -->
  <circle cx="155" cy="114" r="9" fill="#4f46e5"/>
