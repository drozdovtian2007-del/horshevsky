<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <!-- Dashboard background -->
  <rect width="800" height="500" fill="#0f1117"/>
  <!-- Sidebar -->
  <rect width="190" height="500" fill="#16181f"/>
  <rect x="190" width="1" height="500" fill="rgba(255,255,255,0.06)"/>
  <!-- Logo -->
  <rect x="20" y="22" width="32" height="32" rx="8" fill="#f59e0b"/>
  <text x="36" y="43" text-anchor="middle" fill="white" font-size="14" font-weight="700">N</text>
  <text x="62" y="38" fill="white" font-size="14" font-weight="600">NewsBot</text>
  <text x="62" y="52" fill="#6b7280" font-size="10">Панель рассылок</text>
  <!-- Nav items -->
  <rect x="12" y="80" width="168" height="36" rx="8" fill="#1f2937"/>
  <text x="36" y="103" fill="#f59e0b" font-size="13" font-weight="500">📊  Дашборд</text>
  <text x="36" y="143" fill="#6b7280" font-size="13">📨  Рассылки</text>
  <text x="36" y="183" fill="#6b7280" font-size="13">👥  Подписчики</text>
  <text x="36" y="223" fill="#6b7280" font-size="13">📈  Аналитика</text>
  <text x="36" y="263" fill="#6b7280" font-size="13">⚙️  Настройки</text>

  <!-- Main content -->
  <!-- Header -->
  <text x="220" y="38" fill="white" font-size="18" font-weight="600">Дашборд</text>
  <rect x="640" y="16" width="140" height="36" rx="8" fill="#f59e0b"/>
  <text x="710" y="39" text-anchor="middle" fill="white" font-size="13" font-weight="600">+ Новая рассылка</text>

  <!-- Stat cards -->
  <rect x="210" y="64" width="174" height="88" rx="12" fill="#16181f" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="230" y="88" fill="#6b7280" font-size="11">Подписчиков</text>
  <text x="230" y="118" fill="white" font-size="28" font-weight="700">4 280</text>
  <text x="230" y="138" fill="#4ade80" font-size="11">↑ 12% за месяц</text>

  <rect x="398" y="64" width="174" height="88" rx="12" fill="#16181f" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="418" y="88" fill="#6b7280" font-size="11">Open Rate</text>
  <text x="418" y="118" fill="white" font-size="28" font-weight="700">68%</text>
  <text x="418" y="138" fill="#4ade80" font-size="11">↑ 5% vs прошлый месяц</text>

  <rect x="586" y="64" width="190" height="88" rx="12" fill="#16181f" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <text x="606" y="88" fill="#6b7280" font-size="11">Всего рассылок</text>
  <text x="606" y="118" fill="white" font-size="28" font-weight="700">38</text>
  <text x="606" y="138" fill="#f59e0b" font-size="11">3 запланировано</text>

  <!-- Recent campaigns table -->
  <text x="220" y="182" fill="white" font-size="14" font-weight="600">Последние рассылки</text>
  <!-- Table header -->
  <rect x="210" y="194" width="566" height="30" rx="6" fill="rgba(255,255,255,0.03)"/>
  <text x="228" y="214" fill="#6b7280" font-size="11">НАЗВАНИЕ</text>
  <text x="460" y="214" fill="#6b7280" font-size="11">ДАТА</text>
  <text x="560" y="214" fill="#6b7280" font-size="11">ПОЛУЧАТЕЛИ</text>
  <text x="680" y="214" fill="#6b7280" font-size="11">СТАТУС</text>
  <!-- Row 1 -->
  <rect x="210" y="224" width="566" height="40" rx="0" fill="transparent"/>
  <rect x="210" y="264" width="566" height="1" fill="rgba(255,255,255,0.05)"/>
  <text x="228" y="249" fill="white" font-size="12">Акция: -20% на осень</text>
  <text x="460" y="249" fill="#9ca3af" font-size="12">15 окт</text>
  <text x="560" y="249" fill="#9ca3af" font-size="12">4 280</text>
  <rect x="678" y="237" width="68" height="20" rx="10" fill="#14532d"/>
  <text x="712" y="251" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">Отправлено</text>
  <!-- Row 2 -->
  <rect x="210" y="304" width="566" height="1" fill="rgba(255,255,255,0.05)"/>
  <text x="228" y="289" fill="white" font-size="12">Новинки октября</text>
  <text x="460" y="289" fill="#9ca3af" font-size="12">10 окт</text>
  <text x="560" y="289" fill="#9ca3af" font-size="12">3 820</text>
  <rect x="678" y="277" width="68" height="20" rx="10" fill="#14532d"/>
  <text x="712" y="291" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">Отправлено</text>
  <!-- Row 3 -->
  <rect x="210" y="344" width="566" height="1" fill="rgba(255,255,255,0.05)"/>
  <text x="228" y="329" fill="white" font-size="12">Распродажа выходного дня</text>
  <text x="460" y="329" fill="#9ca3af" font-size="12">20 окт</text>
  <text x="560" y="329" fill="#9ca3af" font-size="12">4 280</text>
  <rect x="676" y="317" width="72" height="20" rx="10" fill="#1c3a5e"/>
  <text x="712" y="331" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="600">Запланир.</text>
  <!-- Row 4 -->
  <text x="228" y="369" fill="white" font-size="12">Итоги месяца: сентябрь</text>
  <text x="460" y="369" fill="#9ca3af" font-size="12">5 окт</text>
  <text x="560" y="369" fill="#9ca3af" font-size="12">4 100</text>
  <rect x="678" y="357" width="68" height="20" rx="10" fill="#14532d"/>
  <text x="712" y="371" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">Отправлено</text>

  <!-- Bar chart -->
  <text x="220" y="414" fill="white" font-size="13" font-weight="600">Активность (7 дней)</text>
  <rect x="210" y="424" width="566" height="60" rx="8" fill="#16181f" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- Chart bars -->
  <rect x="240" y="454" width="30" height="22" rx="3" fill="#f59e0b" opacity="0.6"/>
  <rect x="290" y="444" width="30" height="32" rx="3" fill="#f59e0b" opacity="0.8"/>
  <rect x="340" y="438" width="30" height="38" rx="3" fill="#f59e0b"/>
  <rect x="390" y="450" width="30" height="26" rx="3" fill="#f59e0b" opacity="0.7"/>
  <rect x="440" y="442" width="30" height="34" rx="3" fill="#f59e0b" opacity="0.9"/>
  <rect x="490" y="448" width="30" height="28" rx="3" fill="#f59e0b" opacity="0.75"/>
  <rect x="540" y="436" width="30" height="40" rx="3" fill="#f59e0b"/>
  <text x="255" y="489" text-anchor="middle" fill="#6b7280" font-size="9">Пн</text>
  <text x="305" y="489" text-anchor="middle" fill="#6b7280" font-size="9">Вт</text>
  <text x="355" y="489" text-anchor="middle" fill="#6b7280" font-size="9">Ср</text>
  <text x="405" y="489" text-anchor="middle" fill="#6b7280" font-size="9">Чт</text>
  <text x="455" y="489" text-anchor="middle" fill="#6b7280" font-size="9">Пт</text>
  <text x="505" y="489" text-anchor="middle" fill="#6b7280" font-size="9">Сб</text>
  <text x="555" y="489" text-anchor="middle" fill="#6b7280" font-size="9">Вс</text>
</svg>
