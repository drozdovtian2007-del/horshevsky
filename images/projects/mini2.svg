<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="800" height="500" fill="#0a0f20"/>
  <!-- Top bar -->
  <rect width="800" height="52" fill="#0d1228"/>
  <rect width="800" height="1" y="52" fill="rgba(255,255,255,0.06)"/>
  <text x="400" y="30" text-anchor="middle" fill="white" font-size="15" font-weight="600">Запись</text>
  <text x="20" y="30" fill="#818cf8" font-size="13">←</text>

  <!-- Left panel: master selection -->
  <rect x="16" y="66" width="240" height="420" rx="14" fill="#111827"/>
  <text x="136" y="98" text-anchor="middle" fill="white" font-size="13" font-weight="600">Выберите мастера</text>
  <!-- Master 1 active -->
  <rect x="28" y="108" width="216" height="72" rx="10" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="62" cy="144" r="22" fill="#1d4ed8"/>
  <text x="62" y="150" text-anchor="middle" fill="white" font-size="14" font-weight="600">АМ</text>
  <text x="90" y="136" fill="white" font-size="12" font-weight="600">Анна М.</text>
  <text x="90" y="152" fill="#93c5fd" font-size="11">Маникюр · 5 лет</text>
  <text x="90" y="167" fill="#fbbf24" font-size="10">★ 4.9</text>
  <!-- Master 2 -->
  <rect x="28" y="190" width="216" height="72" rx="10" fill="#0d1427"/>
  <circle cx="62" cy="226" r="22" fill="#5b21b6"/>
  <text x="62" y="232" text-anchor="middle" fill="white" font-size="14" font-weight="600">КВ</text>
  <text x="90" y="218" fill="white" font-size="12" font-weight="600">Катя В.</text>
  <text x="90" y="234" fill="#9ca3af" font-size="11">Педикюр · 3 года</text>
  <text x="90" y="249" fill="#fbbf24" font-size="10">★ 4.7</text>
  <!-- Master 3 -->
  <rect x="28" y="272" width="216" height="72" rx="10" fill="#0d1427"/>
  <circle cx="62" cy="308" r="22" fill="#059669"/>
  <text x="62" y="314" text-anchor="middle" fill="white" font-size="14" font-weight="600">ЮН</text>
  <text x="90" y="300" fill="white" font-size="12" font-weight="600">Юля Н.</text>
  <text x="90" y="316" fill="#9ca3af" font-size="11">Брови · 4 года</text>
  <text x="90" y="331" fill="#fbbf24" font-size="10">★ 5.0</text>

  <!-- Right panel: calendar -->
  <rect x="272" y="66" width="512" height="420" rx="14" fill="#111827"/>
  <!-- Month header -->
  <text x="400" y="100" text-anchor="middle" fill="white" font-size="15" font-weight="600">Апрель 2025</text>
  <text x="284" y="100" fill="#818cf8" font-size="18">‹</text>
  <text x="760" y="100" text-anchor="end" fill="#818cf8" font-size="18">›</text>
  <!-- Day labels -->
  <text x="314" y="128" text-anchor="middle" fill="#6b7280" font-size="11">Пн</text>
  <text x="387" y="128" text-anchor="middle" fill="#6b7280" font-size="11">Вт</text>
  <text x="460" y="128" text-anchor="middle" fill="#6b7280" font-size="11">Ср</text>
  <text x="533" y="128" text-anchor="middle" fill="#6b7280" font-size="11">Чт</text>
  <text x="606" y="128" text-anchor="middle" fill="#6b7280" font-size="11">Пт</text>
  <text x="679" y="128" text-anchor="middle" fill="#6b7280" font-size="11">Сб</text>
  <text x="752" y="128" text-anchor="middle" fill="#6b7280" font-size="11">Вс</text>
  <!-- Calendar grid rows, 5 rows -->
  <!-- Row 1 -->
  <text x="606" y="160" text-anchor="middle" fill="#9ca3af" font-size="13">1</text>
  <text x="679" y="160" text-anchor="middle" fill="#9ca3af" font-size="13">2</text>
  <text x="752" y="160" text-anchor="middle" fill="#9ca3af" font-size="13">3</text>
  <!-- Row 2 -->
  <text x="314" y="196" text-anchor="middle" fill="#e5e7eb" font-size="13">7</text>
  <text x="387" y="196" text-anchor="middle" fill="#e5e7eb" font-size="13">8</text>
  <text x="460" y="196" text-anchor="middle" fill="#e5e7eb" font-size="13">9</text>
  <text x="533" y="196" text-anchor="middle" fill="#e5e7eb" font-size="13">10</text>
  <text x="606" y="196" text-anchor="middle" fill="#e5e7eb" font-size="13">11</text>
  <text x="679" y="196" text-anchor="middle" fill="#e5e7eb" font-size="13">12</text>
  <text x="752" y="196" text-anchor="middle" fill="#e5e7eb" font-size="13">13</text>
  <!-- Row 3 -->
  <text x="314" y="232" text-anchor="middle" fill="#e5e7eb" font-size="13">14</text>
  <text x="387" y="232" text-anchor="middle" fill="#e5e7eb" font-size="13">15</text>
  <!-- Selected date -->
  <circle cx="460" cy="224" r="18" fill="#3b82f6"/>
  <text x="460" y="230" text-anchor="middle" fill="white" font-size="13" font-weight="600">16</text>
  <text x="533" y="232" text-anchor="middle" fill="#e5e7eb" font-size="13">17</text>
  <text x="606" y="232" text-anchor="middle" fill="#e5e7eb" font-size="13">18</text>
  <text x="679" y="232" text-anchor="middle" fill="#9ca3af" font-size="13">19</text>
  <text x="752" y="232" text-anchor="middle" fill="#9ca3af" font-size="13">20</text>
  <!-- Row 4 -->
  <text x="314" y="268" text-anchor="middle" fill="#e5e7eb" font-size="13">21</text>
  <text x="387" y="268" text-anchor="middle" fill="#e5e7eb" font-size="13">22</text>
  <text x="460" y="268" text-anchor="middle" fill="#e5e7eb" font-size="13">23</text>
  <text x="533" y="268" text-anchor="middle" fill="#e5e7eb" font-size="13">24</text>
  <text x="606" y="268" text-anchor="middle" fill="#e5e7eb" font-size="13">25</text>
  <text x="679" y="268" text-anchor="middle" fill="#9ca3af" font-size="13">26</text>
  <text x="752" y="268" text-anchor="middle" fill="#9ca3af" font-size="13">27</text>

  <!-- Time slots -->
  <text x="290" y="310" fill="white" font-size="13" font-weight="600">Время · 16 апреля</text>
  <rect x="284" y="320" width="80" height="30" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="324" y="340" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">09:00</text>
  <rect x="374" y="320" width="80" height="30" rx="8" fill="#1a2030"/>
  <text x="414" y="340" text-anchor="middle" fill="#9ca3af" font-size="12">10:00</text>
  <rect x="464" y="320" width="80" height="30" rx="8" fill="#1a2030"/>
  <text x="504" y="340" text-anchor="middle" fill="#9ca3af" font-size="12">11:00</text>
  <rect x="554" y="320" width="80" height="30" rx="8" fill="#1a2030"/>
  <text x="594" y="340" text-anchor="middle" fill="#9ca3af" font-size="12">14:00</text>
  <rect x="644" y="320" width="80" height="30" rx="8" fill="#1a2030"/>
  <text x="684" y="340" text-anchor="middle" fill="#9ca3af" font-size="12">16:00</text>

  <!-- Confirm button -->
  <rect x="284" y="370" width="480" height="50" rx="14" fill="#3b82f6"/>
  <text x="524" y="401" text-anchor="middle" fill="white" font-size="15" font-weight="600">Записаться · 16 апр, 09:00</text>
  <!-- Note -->
  <text x="524" y="440" text-anchor="middle" fill="#4b5563" font-size="11">Подтверждение придёт в Telegram в течение 5 минут</text>
  <text x="524" y="460" text-anchor="middle" fill="#4b5563" font-size="11">Напоминание за 1 час до визита</text>
</svg>
